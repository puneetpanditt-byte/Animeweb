<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-SHOGUN | Comm-Link</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb3af",
                        "surface": "#131314",
                        "background": "#131314",
                        "on-surface": "#e5e2e3"
                    },
                    "fontFamily": {
                        "label-mono": ["Space Mono"],
                        "display-xl": ["Space Grotesk"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-body-md text-on-surface bg-background">
    <div class="particles-bg"></div>
    <header class="bg-surface/80 backdrop-blur-xl border-b border-primary/30">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <a href="index.html" class="font-display-xl text-2xl font-bold tracking-tighter text-primary">NEO-SHOGUN</a>
            <nav class="hidden md:flex gap-8 items-center">
                <a class="font-label-mono text-sm text-on-surface-variant hover:text-primary" href="shop.html">Artifacts</a>
                <a class="font-label-mono text-sm text-on-surface-variant hover:text-primary" href="about.html">Mission</a>
                <a class="font-label-mono text-sm text-primary" href="contact.html">Comm-Link</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-20">
        <div class="text-center mb-16">
            <h1 class="font-display-xl text-6xl mb-4 tracking-tighter uppercase">COMM-LINK</h1>
            <p class="font-label-mono text-primary tracking-[0.2em] uppercase">Establish a direct channel with the Vanguard</p>
        </div>

        <div class="glass-panel p-10">
            <form class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Warrior Alias</label>
                        <input type="text" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary">
                    </div>
                    <div>
                        <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Neural Email</label>
                        <input type="email" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary">
                    </div>
                </div>
                <div>
                    <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Encrypted Message</label>
                    <textarea rows="6" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary"></textarea>
                </div>
                <button class="w-full py-4 bg-[#FF0033] text-white font-label-mono text-sm uppercase tracking-widest neon-glow-red hover:scale-[1.02] transition-transform">
                    Broadcast Message
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-12 opacity-50 font-label-mono text-[10px] uppercase">
        © 2024 NEO-SHOGUN INDUSTRIES. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
