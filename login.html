<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-SHOGUN | Identity Verification</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb3af",
                        "surface": "#131314",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "secondary-fixed": "#7df4ff"
                    },
                    "fontFamily": {
                        "label-mono": ["Space Mono"],
                        "headline-md": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-body-md text-on-surface bg-background h-screen flex items-center justify-center">
    <div class="particles-bg"></div>

    <div class="w-full max-w-md px-6">
        <div class="text-center mb-12">
            <a href="index.html" class="font-display-xl text-5xl font-bold tracking-tighter text-primary mb-2 block">NEO-SHOGUN</a>
            <p class="font-label-mono text-[10px] text-secondary-fixed uppercase tracking-[0.3em]">Neural Link Requesting Access</p>
        </div>

        <div class="glass-panel p-8 border-t-2 border-primary">
            <div class="flex gap-4 mb-8 border-b border-surface-variant pb-4">
                <button class="font-label-mono text-sm uppercase text-primary border-b-2 border-primary pb-2">Initialize</button>
                <a href="register.html" class="font-label-mono text-sm uppercase opacity-50 hover:opacity-100 transition-opacity pb-2">Register</a>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Email Address (India Hub)</label>
                    <input type="email" placeholder="PUNEET.K@SHOGUN.IN" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary">
                </div>
                <div>
                    <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Access Key</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary">
                </div>
                
                <div class="flex justify-between items-center py-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="rounded-none border-primary bg-transparent text-primary focus:ring-0">
                        <span class="font-label-mono text-[10px] uppercase opacity-60 group-hover:opacity-100">Keep Sync Active</span>
                    </label>
                    <a href="#" class="font-label-mono text-[10px] uppercase text-secondary-fixed hover:underline">Forgot Key?</a>
                </div>

                <button class="w-full py-4 bg-[#FF0033] text-white font-label-mono text-sm uppercase tracking-widest neon-glow-red hover:scale-[1.02] transition-transform">
                    Establish Connection
                </button>
            </form>
        </div>

        <p class="text-center mt-12 font-label-mono text-[10px] opacity-30 uppercase tracking-widest">Authorized Warriors Only // Sector 0 Restricted</p>
    </div>
</body>
</html>
