<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-SHOGUN | Join the Vanguard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb3af",
                        "surface": "#131314",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "secondary-fixed": "#7df4ff"
                    },
                    "fontFamily": {
                        "label-mono": ["Space Mono"],
                        "headline-md": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-body-md text-on-surface bg-background min-h-screen flex items-center justify-center py-20">
    <div class="particles-bg"></div>

    <div class="w-full max-w-xl px-6">
        <div class="text-center mb-12">
            <a href="index.html" class="font-display-xl text-5xl font-bold tracking-tighter text-primary mb-2 block">NEO-SHOGUN</a>
            <p class="font-label-mono text-[10px] text-secondary-fixed uppercase tracking-[0.3em]">Enlist in the Digital Vanguard</p>
        </div>

        <div class="glass-panel p-10 border-t-2 border-secondary-fixed">
            <h2 class="font-headline-md text-2xl mb-8 uppercase tracking-widest text-center">Identity Enrollment</h2>
            
            <form class="space-y-6">
                    <div>
                        <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">First Name</label>
                        <input type="text" placeholder="PUNEET" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary transition-colors">
                    </div>
                    <div>
                        <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Last Name</label>
                        <input type="text" placeholder="KUMAR" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary transition-colors">
                    </div>

                <div>
                    <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Email Address (India Hub)</label>
                    <input type="email" placeholder="PUNEET.K@SHOGUN.IN" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary transition-colors">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Access Key</label>
                        <input type="password" placeholder="••••••••" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary transition-colors">
                    </div>
                    <div>
                        <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Confirm Key</label>
                        <input type="password" placeholder="••••••••" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary transition-colors">
                    </div>
                </div>

                <div class="py-4">
                    <label class="flex items-start gap-3 cursor-pointer group">
                        <input type="checkbox" class="mt-1 rounded-none border-primary bg-transparent text-primary focus:ring-0">
                        <span class="font-label-mono text-[10px] uppercase opacity-60 group-hover:opacity-100 leading-relaxed">
                            I agree to the <a href="terms.html" class="text-secondary-fixed underline">Terms of Infiltration</a> and <a href="privacy.html" class="text-secondary-fixed underline">Privacy Protocol</a>.
                        </span>
                    </label>
                </div>

                <button class="w-full py-4 bg-[#FF0033] text-white font-label-mono text-sm uppercase tracking-widest neon-glow-red hover:scale-[1.02] transition-transform">
                    Initialize Enrollment
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-surface-variant text-center">
                <p class="font-label-mono text-[10px] uppercase opacity-50">Already Verified? <a href="login.html" class="text-primary hover:underline">Access Portal</a></p>
            </div>
        </div>

        <div class="mt-12 flex justify-center gap-8 opacity-30 font-label-mono text-[10px] uppercase tracking-widest">
            <span>Sector 0: India Hub</span>
            <span>Security: Active</span>
        </div>
    </div>
</body>
</html>
