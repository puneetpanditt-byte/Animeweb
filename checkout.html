<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-SHOGUN | Credit Transfer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb3af",
                        "surface": "#131314",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "secondary-fixed": "#7df4ff"
                    },
                    "fontFamily": {
                        "label-mono": ["Space Mono"],
                        "headline-md": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-body-md text-on-surface bg-background">
    <div class="particles-bg"></div>
    <header class="bg-surface/80 backdrop-blur-xl border-b border-primary/30">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <a href="index.html" class="font-headline-md text-2xl font-bold tracking-tighter text-primary">NEO-SHOGUN</a>
            <span class="font-label-mono text-xs text-secondary-fixed uppercase tracking-widest">Secure Credit Transfer</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-20">
        <div class="flex flex-col md:flex-row gap-12">
            <!-- Checkout Form -->
            <div class="md:w-2/3 glass-panel p-8">
                <h2 class="font-headline-md text-2xl mb-8 uppercase tracking-tight">Delivery Protocol</h2>
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Delivery Address / Sector</label>
                            <input type="text" placeholder="NEW_DELHI_SECTOR_45" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary">
                        </div>
                        <div>
                            <label class="font-label-mono text-[10px] text-primary uppercase block mb-2">Email Protocol (India)</label>
                            <input type="email" placeholder="PUNEET.K@SHOGUN.IN" class="w-full bg-surface-container border-b border-surface-variant text-on-surface p-3 focus:outline-none focus:border-primary">
                        </div>
                    </div>
                    <div>
                        <h2 class="font-headline-md text-2xl mt-12 mb-8 uppercase tracking-tight">Payment Source</h2>
                        <div class="p-4 border border-primary/30 bg-primary/5 flex items-center gap-4 mb-4">
                            <span class="material-symbols-outlined text-primary">payments</span>
                            <span class="font-label-mono text-xs uppercase">UPI / Rupay Connected: puneet@okaxis</span>
                        </div>
                    </div>
                    <button class="w-full py-4 bg-[#FF0033] text-white font-label-mono text-sm uppercase tracking-widest neon-glow-red hover:scale-[1.02] transition-transform">
                        Confirm Transfer
                    </button>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="md:w-1/3">
                <div class="glass-panel p-6 border-t-2 border-secondary-fixed">
                    <h3 class="font-label-mono text-xs text-secondary-fixed uppercase mb-6 tracking-widest">Summary</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-xs uppercase opacity-70">
                            <span>Oni-Link Mk.IV</span>
                            <span>₹1,240</span>
                        </div>
                        <div class="flex justify-between text-xs uppercase opacity-70">
                            <span>Dispatch Fee</span>
                            <span>₹40</span>
                        </div>
                    </div>
                    <div class="border-t border-surface-variant pt-4 flex justify-between items-end">
                        <span class="font-label-mono text-xs uppercase">Total:</span>
                        <span class="text-2xl font-headline-md text-primary">₹1,280</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-surface-container-lowest py-12 border-t border-surface-variant text-center">
        <div class="font-label-mono text-[10px] opacity-50 uppercase">© 2024 NEO-SHOGUN INDUSTRIES. ALL RIGHTS RESERVED.</div>
    </footer>
</body>
</html>
